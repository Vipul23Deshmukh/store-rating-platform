services:
  # ─── NestJS Backend Web Service ─────────────────────────────────────────────
  - type: web
    name: store-rating-backend
    runtime: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npx prisma migrate deploy && npm run start:prod
    env: node
    plan: free
    region: oregon # Render's standard region
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000 # Render default port for web services
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: store-rating-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render will generate a cryptographically secure key automatically
      - key: JWT_EXPIRATION
        value: 24h
      - key: CORS_ORIGIN
        sync: false # User will set their Vercel frontend URL after deploying the frontend

# ─── PostgreSQL Database Service ──────────────────────────────────────────────
databases:
  - name: store-rating-db
    plan: free
    region: oregon
    postgresMajorVersion: 16
